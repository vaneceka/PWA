<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LingoReader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --p: #007aff; --bg: #ffffff; --text: #000000; --card: #f2f2f7; }
        [data-theme="dark"] { --bg: #000000; --text: #ffffff; --card: #1c1c1e; --p: #0a84ff; }

        *, *::before, *::after { box-sizing: border-box; }

        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); touch-action: pan-x pan-y; overflow-x: hidden; }
        
        .tab-content { display: none; padding: calc(15px + env(safe-area-inset-top)) 20px 120px 20px; }
        .tab-content.active { display: block; }
        
        #tab-reader { padding: env(safe-area-inset-top) 0 120px 0; overflow-x: auto; }

        #pdf-view { position: relative; display: flex; flex-direction: column; align-items: flex-start; min-width: 100%; width: max-content; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .pdf-page-wrapper canvas { display: block; z-index: 1; width: 100%; }
        
        .textLayer { position: absolute; left: 0; top: 0; right: 0; bottom: 0; overflow: hidden; line-height: 1; text-size-adjust: none; z-index: 2; }
        .textLayer span { color: transparent; position: absolute; white-space: pre; cursor: text; transform-origin: 0% 0%; }
        .textLayer ::selection { background: rgba(0, 122, 255, 0.3); }

        .pagination-bar { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(var(--bg), 0.9); backdrop-filter: blur(10px); padding: 8px 16px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 50; display: none; }
        #page-info { font-weight: bold; font-size: 14px; color: var(--text); }

        .zoom-controls { position: fixed; right: 15px; bottom: 140px; background: rgba(var(--bg), 0.9); backdrop-filter: blur(10px); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: none; flex-direction: column; align-items: center; z-index: 55; }
        .zoom-controls button { background: none; border: none; color: var(--p); font-size: 22px; padding: 12px 15px; cursor: pointer; font-weight: bold; }
        .zoom-controls .zoom-val { font-size: 12px; font-weight: bold; color: var(--text); padding: 5px 0; border-top: 1px solid rgba(128,128,128,0.2); border-bottom: 1px solid rgba(128,128,128,0.2); width: 100%; text-align: center; }

        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 10px 0 env(safe-area-inset-bottom); background: var(--card); border-top: 1px solid rgba(128,128,128,0.2); z-index: 101; }
        .tab-item { text-align: center; font-size: 10px; color: #8e8e93; text-decoration: none; flex: 1; }
        .tab-item.active { color: var(--p); }

        .card { background: var(--card); border-radius: 15px; padding: 40px 20px; text-align: center; margin-top: 20px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; font-size: 24px; font-weight: 600; user-select: none; }

        #popover { position: fixed; bottom: 120px; left: 15px; right: 15px; background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: none; z-index: 1000; max-height: 60vh; overflow-y: auto; }
        #pop-en { font-weight: bold; font-size: 18px; line-height: 1.4; word-wrap: break-word; }
        #pop-cs { margin: 15px 0; font-size: 16px; opacity: 0.9; line-height: 1.4; word-wrap: break-word; }
        
        .btn-action { background: var(--p); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; max-width: 500px; margin: 10px auto 0 auto; font-weight: bold; font-size: 16px; cursor: pointer; display: block; text-align: center; }
        
        .word-item { padding: 15px; border-bottom: 1px solid rgba(128,128,128,0.3); display: flex; justify-content: space-between; align-items: center; }
        .word-item-text { display: flex; flex-direction: column; flex: 1; }
        .book-item { padding: 15px; background: var(--card); border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        #translate-tooltip { display: none; position: fixed; background: var(--p); color: white; border: none; padding: 10px 16px; border-radius: 12px; font-weight: bold; font-size: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 2000; transform: translateX(-50%); cursor: pointer; }

        .card-controls-container { position: fixed; bottom: calc(70px + env(safe-area-inset-bottom)); left: 0; right: 0; max-width: 500px; margin: 0 auto; padding: 0 20px; z-index: 90; }
        .card-controls { display: flex; justify-content: space-between; align-items: stretch; gap: 10px; }
        .card-btn { background: var(--card); color: var(--text); border: none; padding: 15px 10px; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05); flex: 1; }
        .card-counter { font-size: 14px; color: gray; font-weight: bold; }
    </style>
</head>
<body>

<div id="tab-library" class="tab-content active">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; margin-top: 10px;">
        <h2 style="margin: 0;">Moje Knihy</h2>
        <div>
            <span onclick="forceUpdate()" style="font-size: 24px; cursor: pointer; margin-right: 15px;" title="Aktualizovat aplikaci z GitHubu">🔄</span>
            <span onclick="toggleTheme()" style="font-size: 24px; cursor: pointer;" title="Přepnout motiv">🌓</span>
        </div>
    </div>
    
    <label for="file-upload" class="btn-action" style="margin-bottom: 20px; background: #34c759;">+ Přidat knihu (PDF)</label>
    <input type="file" id="file-upload" accept="application/pdf" style="display:none">
    <div id="book-list">Načítám knihovnu...</div>
</div>

<div id="tab-reader" class="tab-content">
    <div id="pdf-view"></div>
    
    <div class="pagination-bar" id="pagination">
        <span id="page-info">1 / 1</span>
    </div>

    <div class="zoom-controls" id="zoom-controls">
        <button onclick="changeZoom(0.10)">➕</button>
        <div class="zoom-val" id="zoom-val">100%</div>
        <button onclick="changeZoom(-0.10)">➖</button>
    </div>
    
    <div id="no-book-msg" style="text-align:center; padding: 50px 20px; display:none;">
        <p>Zatím nemáte otevřenou žádnou knihu.</p>
        <button class="btn-action" onclick="document.getElementById('nav-lib').click()">Přejít do knihovny</button>
    </div>
</div>

<div id="tab-words" class="tab-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; margin-bottom: 15px;">
        <h2 style="margin: 0;">Slovníček</h2>
        <div>
            <button onclick="exportBackup()" style="background: #34c759; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px;">💾 Záloha</button>
            <label for="import-words" style="background: #ff9500; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; margin-left: 5px;">📂 Obnovit</label>
            <input type="file" id="import-words" accept=".json" style="display:none" onchange="importBackup(event)">
        </div>
    </div>
    <div id="word-list"></div>
</div>

<div id="tab-translate" class="tab-content">
    <h2 style="margin-top: 10px; text-align:center;">Překladač</h2>
    
    <div style="display: flex; justify-content: center; align-items: center; margin-bottom: 15px;">
        <span id="lang-from" style="font-weight:bold; font-size:16px;">Angličtina</span>
        <button onclick="swapLanguages()" style="background:var(--card); border:none; border-radius:50%; font-size:20px; cursor:pointer; margin: 0 20px; width:40px; height:40px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">🔄</button>
        <span id="lang-to" style="font-weight:bold; font-size:16px;">Čeština</span>
    </div>

    <textarea id="manual-input" style="width:100%; max-width: 500px; display: block; margin: 0 auto; height:120px; border-radius:15px; padding:15px; background:var(--card); color:var(--text); border:none; font-size:16px;" placeholder="Vlož slovo nebo větu..."></textarea>
    <button class="btn-action" onclick="manualTranslate()">Přeložit</button>
    <div id="manual-result" style="margin-top:20px; max-width: 500px; margin-left: auto; margin-right: auto;"></div>
</div>

<div id="tab-cards" class="tab-content">
    <h2 style="margin-top: 10px; max-width: 500px; margin-left: auto; margin-right: auto;">Trénink</h2>
    <div id="flashcard" class="card" style="max-width: 500px; margin-left: auto; margin-right: auto;" onclick="flipCard()">Nahrajte slova</div>
    
    <div class="card-controls-container">
        <div style="text-align: center; margin-bottom: 12px;">
            <span class="card-counter" id="card-counter">Slov celkem: 0</span>
        </div>
        
        <div class="card-controls">
            <button class="card-btn" onclick="markUnknown()" style="background: #ff3b30; color: white;">❌ Neumím</button>
            <button class="card-btn" onclick="flipCard()" style="color: var(--p);">🔄 Otočit</button>
            <button class="card-btn" onclick="markKnown()" style="background: #34c759; color: white;">✅ Umím</button>
        </div>
    </div>
</div>

<button id="translate-tooltip" onclick="executeTranslation()">🌐 Přeložit</button>

<div id="popover">
    <div id="pop-en"></div>
    <div id="pop-cs"></div>
    <button class="btn-action" onclick="saveWord()">Uložit do slovníčku</button>
    <button onclick="closePop()" style="background:none; border:none; color:gray; width:100%; margin-top:15px; padding: 10px; font-weight:bold;">Zrušit označení</button>
</div>

<div class="tab-bar">
    <a href="#" id="nav-lib" class="tab-item active" onclick="showTab('library', this)">📚<br>Knihovna</a>
    <a href="#" id="nav-read" class="tab-item" onclick="showTab('reader', this)">📖<br>Čtení</a>
    <a href="#" class="tab-item" onclick="showTab('translate', this)">🔍<br>Překlad</a>
    <a href="#" class="tab-item" onclick="showTab('words', this)">📝<br>Slova</a>
    <a href="#" class="tab-item" onclick="showTab('cards', this)">🗂️<br>Karty</a>
</div>

<script>
    let words = JSON.parse(localStorage.getItem('lingo_words') || '[]');
    let currentPdf = null;
    let currentBookId = null;
    let lastSelection = { en: '', cs: '' };
    let db;
    let pageObserver; 
    let globalZoom = 1.0; 
    let pendingTranslationText = ""; 
    let langFrom = 'en';
    let langTo = 'cs';

    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('LingoDB', 1);
            request.onerror = (e) => reject("Chyba databáze");
            request.onsuccess = (e) => { db = e.target.result; resolve(db); };
            request.onupgradeneeded = (e) => {
                const database = e.target.result;
                if (!database.objectStoreNames.contains('books')) {
                    database.createObjectStore('books', { keyPath: 'id' });
                }
            };
        });
    }

    initDB().then(() => renderLibrary());

    function toggleTheme() {
        const doc = document.documentElement;
        doc.setAttribute('data-theme', doc.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function forceUpdate() {
        if(confirm("Chcete stáhnout nejnovější verzi aplikace z GitHubu? (Tvoje knihy a slovíčka zůstanou v bezpečí)")) {
            window.location.href = window.location.pathname + '?v=' + new Date().getTime();
        }
    }

    function swapLanguages() {
        if (langFrom === 'en') {
            langFrom = 'cs';
            langTo = 'en';
            document.getElementById('lang-from').innerText = 'Čeština';
            document.getElementById('lang-to').innerText = 'Angličtina';
        } else {
            langFrom = 'en';
            langTo = 'cs';
            document.getElementById('lang-from').innerText = 'Angličtina';
            document.getElementById('lang-to').innerText = 'Čeština';
        }
    }

    async function translate(text, sl = 'auto', tl = 'cs') {
        if (!text) return "";
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`;
            const res = await fetch(url);
            const data = await res.json();
            
            let translatedText = "";
            data[0].forEach(item => {
                translatedText += item[0];
            });
            return translatedText;
        } catch (e) { 
            console.error("Chyba překladu:", e);
            return "Chyba překladu. Zkontrolujte připojení."; 
        }
    }

    const fileInput = document.getElementById('file-upload');
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        document.getElementById('book-list').innerHTML = "Ukládám knihu do iPhonu...";
        
        const arrayBuffer = await file.arrayBuffer();
        const bookName = file.name.replace('.pdf', '');
        
        let startPage = 1;
        const savedProgress = JSON.parse(localStorage.getItem('lingo_book_progress') || '[]');
        const match = savedProgress.find(p => p.name === bookName);
        if (match) startPage = match.currentPage;

        const book = {
            id: file.name,
            name: bookName,
            data: arrayBuffer,
            currentPage: startPage
        };

        const tx = db.transaction('books', 'readwrite');
        tx.objectStore('books').put(book);
        tx.oncomplete = () => renderLibrary();
    });

    function renderLibrary() {
        if(!db) return;
        const tx = db.transaction('books', 'readonly');
        const req = tx.objectStore('books').getAll();
        req.onsuccess = () => {
            const books = req.result;
            const list = document.getElementById('book-list');
            if(books.length === 0) {
                list.innerHTML = "<p style='color:gray; text-align:center;'>Zatím tu nemáte žádné knihy.</p>";
                return;
            }
            list.innerHTML = books.map(b => `
                <div class="book-item" style="max-width: 500px; margin-left: auto; margin-right: auto;">
                    <div onclick="openBook('${b.id}')" style="flex:1; cursor:pointer;">
                        <b>${b.name.substring(0,25)}...</b><br>
                        <small style="color:gray;">Rozečteno: Strana ${b.currentPage || 1}</small>
                    </div>
                    <button onclick="deleteBook('${b.id}')" style="background:none; border:none; font-size:22px; color:#ff3b30; padding:10px;">🗑️</button>
                </div>
            `).reverse().join('');
        };
    }

    function deleteBook(id) {
        if(confirm("Opravdu smazat tuto knihu?")) {
            const tx = db.transaction('books', 'readwrite');
            tx.objectStore('books').delete(id);
            tx.oncomplete = () => {
                if(currentBookId === id) {
                    currentBookId = null;
                    currentPdf = null;
                    document.getElementById('pdf-view').style.display = 'none';
                    document.getElementById('pagination').style.display = 'none';
                    document.getElementById('zoom-controls').style.display = 'none';
                }
                renderLibrary();
            };
        }
    }

    function openBook(id) {
        const tx = db.transaction('books', 'readonly');
        const req = tx.objectStore('books').get(id);
        req.onsuccess = async () => {
            const book = req.result;
            if(!book) return;
            
            currentBookId = book.id;
            globalZoom = 1.0; 
            document.getElementById('zoom-val').innerText = '100%';
            currentPdf = await pdfjsLib.getDocument({ data: new Uint8Array(book.data) }).promise;
            
            document.getElementById('pdf-view').style.display = 'flex';
            document.getElementById('pagination').style.display = 'block';
            document.getElementById('zoom-controls').style.display = 'flex';
            document.getElementById('no-book-msg').style.display = 'none';
            
            document.getElementById('nav-read').click();
            
            initScrollReader(book.currentPage || 1);
        };
    }

    function updateBookProgress(page) {
        if(!currentBookId || !db) return;
        const tx = db.transaction('books', 'readwrite');
        const store = tx.objectStore('books');
        const req = store.get(currentBookId);
        req.onsuccess = () => {
            const book = req.result;
            if(book) {
                book.currentPage = page;
                store.put(book);
            }
        };
    }

    function changeZoom(delta) {
        let newZoom = globalZoom + delta;
        if (newZoom < 0.5) newZoom = 0.5;
        if (newZoom > 3.0) newZoom = 3.0;
        
        newZoom = Math.round(newZoom * 10) / 10;
        
        if (newZoom === globalZoom) return;
        
        globalZoom = newZoom;
        document.getElementById('zoom-val').innerText = Math.round(globalZoom * 100) + '%';
        
        let currentPage = parseInt(document.getElementById('page-info').innerText.split(' / ')[0]) || 1;
        initScrollReader(currentPage); 
    }

    function initScrollReader(startPage) {
        const container = document.getElementById('pdf-view');
        container.innerHTML = '';
        
        if (pageObserver) pageObserver.disconnect();
        
        pageObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const wrapper = entry.target;
                    const num = parseInt(wrapper.dataset.page);
                    
                    if (wrapper.dataset.loaded === 'false') {
                        wrapper.dataset.loaded = 'true';
                        renderSinglePage(num, wrapper);
                    }
                    
                    document.getElementById('page-info').innerText = `${num} / ${currentPdf.numPages}`;
                    updateBookProgress(num);
                }
            });
        }, { rootMargin: '300px 0px' });
        
        for (let num = 1; num <= currentPdf.numPages; num++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'pdf-page-wrapper';
            wrapper.id = 'page-wrapper-' + num;
            wrapper.style.minHeight = window.innerHeight + 'px';
