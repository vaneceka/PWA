<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LingoReader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --p: #007aff; --bg: #ffffff; --text: #000000; --card: #f2f2f7; }
        [data-theme="dark"] { --bg: #000000; --text: #ffffff; --card: #1c1c1e; --p: #0a84ff; }

        *, *::before, *::after { box-sizing: border-box; }

        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); touch-action: pan-x pan-y; overflow-x: hidden; }
        
        .tab-content { display: none; padding: 20px 20px 120px 20px; }
        .tab-content.active { display: block; }
        #tab-reader { padding: 0 0 120px 0; overflow-x: auto; }

        #pdf-view { position: relative; display: flex; flex-direction: column; align-items: flex-start; min-width: 100%; width: max-content; }
        .pdf-page-wrapper { position: relative; background: white; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .pdf-page-wrapper canvas { display: block; z-index: 1; width: 100%; }
        
        .textLayer { position: absolute; left: 0; top: 0; right: 0; bottom: 0; overflow: hidden; line-height: 1; text-size-adjust: none; z-index: 2; }
        .textLayer span { color: transparent; position: absolute; white-space: pre; cursor: text; transform-origin: 0% 0%; }
        .textLayer ::selection { background: rgba(0, 122, 255, 0.3); }

        .pagination-bar { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(var(--bg), 0.9); backdrop-filter: blur(10px); padding: 8px 16px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 50; display: none; }
        #page-info { font-weight: bold; font-size: 14px; color: var(--text); }

        .zoom-controls { position: fixed; right: 15px; bottom: 140px; background: rgba(var(--bg), 0.9); backdrop-filter: blur(10px); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: none; flex-direction: column; align-items: center; z-index: 55; }
        .zoom-controls button { background: none; border: none; color: var(--p); font-size: 22px; padding: 12px 15px; cursor: pointer; font-weight: bold; }
        .zoom-controls .zoom-val { font-size: 12px; font-weight: bold; color: var(--text); padding: 5px 0; border-top: 1px solid rgba(128,128,128,0.2); border-bottom: 1px solid rgba(128,128,128,0.2); width: 100%; text-align: center; }

        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); background: var(--card); border-top: 1px solid #ccc; z-index: 101; }
        .tab-item { text-align: center; font-size: 10px; color: #8e8e93; text-decoration: none; flex: 1; }
        .tab-item.active { color: var(--p); }

        .card { background: var(--card); border-radius: 15px; padding: 40px 20px; text-align: center; margin-top: 20px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; font-size: 24px; font-weight: 600; user-select: none; }

        #popover { position: fixed; bottom: 120px; left: 15px; right: 15px; background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: none; z-index: 1000; max-height: 60vh; overflow-y: auto; }
        #pop-en { font-weight: bold; font-size: 18px; line-height: 1.4; word-wrap: break-word; }
        #pop-cs { margin: 15px 0; font-size: 16px; opacity: 0.9; line-height: 1.4; word-wrap: break-word; }
        
        .btn-action { background: var(--p); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; max-width: 500px; margin: 10px auto 0 auto; font-weight: bold; font-size: 16px; cursor: pointer; display: block; text-align: center; }
        
        .word-item { padding: 15px; border-bottom: 1px solid rgba(128,128,128,0.3); display: flex; justify-content: space-between; align-items: center; }
        .word-item-text { display: flex; flex-direction: column; flex: 1; }
        .book-item { padding: 15px; background: var(--card); border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        #translate-tooltip { display: none; position: fixed; background: var(--p); color: white; border: none; padding: 10px 16px; border-radius: 12px; font-weight: bold; font-size: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 2000; transform: translateX(-50%); cursor: pointer; }

        .card-controls-container { position: fixed; bottom: calc(85px + env(safe-area-inset-bottom)); left: 0; right: 0; max-width: 500px; margin: 0 auto; padding: 0 20px; z-index: 90; }
        .card-controls { display: flex; justify-content: space-between; align-items: center; }
        .card-btn { background: var(--card); color: var(--text); border: none; padding: 15px 25px; border-radius: 12px; font-size: 20px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-counter { font-size: 14px; color: gray; font-weight: bold; }
    </style>
</head>
<body>

<div id="tab-library" class="tab-content active">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; margin-top: 20px;">
        <h2 style="margin: 0;">Moje Knihy</h2>
        <div>
            <span onclick="forceUpdate()" style="font-size: 24px; cursor: pointer; margin-right: 15px;" title="Aktualizovat aplikaci z GitHubu">🔄</span>
            <span onclick="toggleTheme()" style="font-size: 24px; cursor: pointer;" title="Přepnout motiv">🌓</span>
        </div>
    </div>
    
    <label for="file-upload" class="btn-action" style="margin-bottom: 20px; background: #34c759;">+ Přidat knihu (PDF)</label>
    <input type="file" id="file-upload" accept="application/pdf" style="display:none">
    <div id="book-list">Načítám knihovnu...</div>
</div>

<div id="tab-reader" class="tab-content">
    <div id="pdf-view"></div>
    
    <div class="pagination-bar" id="pagination">
        <span id="page-info">1 / 1</span>
    </div>

    <div class="zoom-controls" id="zoom-controls">
        <button onclick="changeZoom(0.10)">➕</button>
        <div class="zoom-val" id="zoom-val">100%</div>
        <button onclick="changeZoom(-0.10)">➖</button>
    </div>
    
    <div id="no-book-msg" style="text-align:center; padding: 50px 20px; display:none;">
        <p>Zatím nemáte otevřenou žádnou knihu.</p>
        <button class="btn-action" onclick="document.getElementById('nav-lib').click()">Přejít do knihovny</button>
    </div>
</div>

<div id="tab-words" class="tab-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; margin-bottom: 15px;">
        <h2 style="margin: 0;">Slovníček</h2>
        <div>
            <button onclick="exportBackup()" style="background: #34c759; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px;">💾 Záloha</button>
            <label for="import-words" style="background: #ff9500; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; margin-left: 5px;">📂 Obnovit</label>
            <input type="file" id="import-words" accept=".json" style="display:none" onchange="importBackup(event)">
        </div>
    </div>
    <div id="word-list"></div>
</div>

<div id="tab-translate" class="tab-content">
    <h2 style="margin-top: 20px;">Překladač</h2>
    <textarea id="manual-input" style="width:100%; max-width: 500px; display: block; margin: 0 auto; height:120px; border-radius:15px; padding:15px; background:var(--card); color:var(--text); border:none; font-size:16px;" placeholder="Vlož slovo nebo větu..."></textarea>
    <button class="btn-action" onclick="manualTranslate()">Přeložit</button>
    <div id="manual-result" style="margin-top:20px; max-width: 500px; margin-left: auto; margin-right: auto;"></div>
</div>

<div id="tab-cards" class="tab-content">
    <h2 style="margin-top: 20px; max-width: 500px; margin-left: auto; margin-right: auto;">Trénink</h2>
    <div id="flashcard" class="card" style="max-width: 500px; margin-left: auto; margin-right: auto;" onclick="flipCard()">Nahrajte slova</div>
    
    <div class="card-controls-container">
        <div style="text-align: center; margin-bottom: 12px;">
            <span class="card-counter" id="card-counter">0 / 0</span>
        </div>
        
        <div class="card-controls">
            <button class="card-btn" onclick="prevCard()">⬅️</button>
            <button class="card-btn" onclick="flipCard()" style="flex-grow: 1; margin: 0 15px; font-size: 18px; color: var(--p);">🔄 Otočit</button>
            <button class="card-btn" onclick="nextCard()">➡️</button>
        </div>
        <p style="text-align:center; color:gray; font-size:12px; margin-top:15px; margin-bottom: 0;">Můžeš také přejet prstem doleva/doprava</p>
    </div>
</div>

<button id="translate-tooltip" onclick="executeTranslation()">🌐 Přeložit</button>

<div id="popover">
    <div id="pop-en"></div>
    <div id="pop-cs"></div>
    <button class="btn-action" onclick="saveWord()">Uložit do slovníčku</button>
    <button onclick="closePop()" style="background:none; border:none; color:gray; width:100%; margin-top:15px; padding: 10px; font-weight:bold;">Zrušit označení</button>
</div>

<div class="tab-bar">
    <a href="#" id="nav-lib" class="tab-item active" onclick="showTab('library', this)">📚<br>Knihovna</a>
    <a href="#" id="nav-read" class="tab-item" onclick="showTab('reader', this)">📖<br>Čtení</a>
    <a href="#" class="tab-item" onclick="showTab('translate', this)">🔍<br>Překlad</a>
    <a href="#" class="tab-item" onclick="showTab('words', this)">📝<br>Slova</a>
    <a href="#" class="tab-item" onclick="showTab('cards', this)">🗂️<br>Karty</a>
</div>

<script>
    let words = JSON.parse(localStorage.getItem('lingo_words') || '[]');
    let currentPdf = null;
    let currentBookId = null;
    let lastSelection = { en: '', cs: '' };
    let db;
    let pageObserver; 
    let globalZoom = 1.0; 
    let pendingTranslationText = ""; 

    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('LingoDB', 1);
            request.onerror = (e) => reject("Chyba databáze");
            request.onsuccess = (e) => { db = e.target.result; resolve(db); };
            request.onupgradeneeded = (e) => {
                const database = e.target.result;
                if (!database.objectStoreNames.contains('books')) {
                    database.createObjectStore('books', { keyPath: 'id' });
                }
            };
        });
    }

    initDB().then(() => renderLibrary());

    function toggleTheme() {
        const doc = document.documentElement;
        doc.setAttribute('data-theme', doc.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function forceUpdate() {
        if(confirm("Chcete stáhnout nejnovější verzi aplikace z GitHubu? (Tvoje knihy a slovíčka zůstanou v bezpečí)")) {
            window.location.href = window.location.pathname + '?v=' + new Date().getTime();
        }
    }

    async function translate(text) {
        if (!text) return "";
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|cs`);
            const data = await res.json();
            return data.responseData.translatedText;
        } catch (e) { return "Chyba překladu"; }
    }

    const fileInput = document.getElementById('file-upload');
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        document.getElementById('book-list').innerHTML = "Ukládám knihu do iPhonu...";
        
        const arrayBuffer = await file.arrayBuffer();
        const bookName = file.name.replace('.pdf', '');
        
        // Zkusíme najít uložený progres (pokud jsme předtím obnovovali zálohu)
        let startPage = 1;
        const savedProgress = JSON.parse(localStorage.getItem('lingo_book_progress') || '[]');
        const match = savedProgress.find(p => p.name === bookName);
        if (match) startPage = match.currentPage;

        const book = {
            id: file.name, // Použijeme jméno jako ID pro lepší párování při obnově
            name: bookName,
            data: arrayBuffer,
            currentPage: startPage
        };

        const tx = db.transaction('books', 'readwrite');
        tx.objectStore('books').put(book);
        tx.oncomplete = () => renderLibrary();
    });

    function renderLibrary() {
        if(!db) return;
        const tx = db.transaction('books', 'readonly');
        const req = tx.objectStore('books').getAll();
        req.onsuccess = () => {
            const books = req.result;
            const list = document.getElementById('book-list');
            if(books.length === 0) {
                list.innerHTML = "<p style='color:gray; text-align:center;'>Zatím tu nemáte žádné knihy.</p>";
                return;
            }
            list.innerHTML = books.map(b => `
                <div class="book-item" style="max-width: 500px; margin-left: auto; margin-right: auto;">
                    <div onclick="openBook('${b.id}')" style="flex:1; cursor:pointer;">
                        <b>${b.name.substring(0,25)}...</b><br>
                        <small style="color:gray;">Rozečteno: Strana ${b.currentPage || 1}</small>
                    </div>
                    <button onclick="deleteBook('${b.id}')" style="background:none; border:none; font-size:22px; color:#ff3b30; padding:10px;">🗑️</button>
                </div>
            `).reverse().join('');
        };
    }

    function deleteBook(id) {
        if(confirm("Opravdu smazat tuto knihu?")) {
            const tx = db.transaction('books', 'readwrite');
            tx.objectStore('books').delete(id);
            tx.oncomplete = () => {
                if(currentBookId === id) {
                    currentBookId = null;
                    currentPdf = null;
                    document.getElementById('pdf-view').style.display = 'none';
                    document.getElementById('pagination').style.display = 'none';
                    document.getElementById('zoom-controls').style.display = 'none';
                }
                renderLibrary();
            };
        }
    }

    function openBook(id) {
        const tx = db.transaction('books', 'readonly');
        const req = tx.objectStore('books').get(id);
        req.onsuccess = async () => {
            const book = req.result;
            if(!book) return;
            
            currentBookId = book.id;
            globalZoom = 1.0; 
            document.getElementById('zoom-val').innerText = '100%';
            currentPdf = await pdfjsLib.getDocument({ data: new Uint8Array(book.data) }).promise;
            
            document.getElementById('pdf-view').style.display = 'flex';
            document.getElementById('pagination').style.display = 'block';
            document.getElementById('zoom-controls').style.display = 'flex';
            document.getElementById('no-book-msg').style.display = 'none';
            
            document.getElementById('nav-read').click();
            
            initScrollReader(book.currentPage || 1);
        };
    }

    function updateBookProgress(page) {
        if(!currentBookId || !db) return;
        const tx = db.transaction('books', 'readwrite');
        const store = tx.objectStore('books');
        const req = store.get(currentBookId);
        req.onsuccess = () => {
            const book = req.result;
            if(book) {
                book.currentPage = page;
                store.put(book);
            }
        };
    }

    function changeZoom(delta) {
        let newZoom = globalZoom + delta;
        if (newZoom < 0.5) newZoom = 0.5;
        if (newZoom > 3.0) newZoom = 3.0;
        
        newZoom = Math.round(newZoom * 10) / 10;
        
        if (newZoom === globalZoom) return;
        
        globalZoom = newZoom;
        document.getElementById('zoom-val').innerText = Math.round(globalZoom * 100) + '%';
        
        let currentPage = parseInt(document.getElementById('page-info').innerText.split(' / ')[0]) || 1;
        initScrollReader(currentPage); 
    }

    function initScrollReader(startPage) {
        const container = document.getElementById('pdf-view');
        container.innerHTML = '';
        
        if (pageObserver) pageObserver.disconnect();
        
        pageObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const wrapper = entry.target;
                    const num = parseInt(wrapper.dataset.page);
                    
                    if (wrapper.dataset.loaded === 'false') {
                        wrapper.dataset.loaded = 'true';
                        renderSinglePage(num, wrapper);
                    }
                    
                    document.getElementById('page-info').innerText = `${num} / ${currentPdf.numPages}`;
                    updateBookProgress(num);
                }
            });
        }, { rootMargin: '300px 0px' });
        
        for (let num = 1; num <= currentPdf.numPages; num++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'pdf-page-wrapper';
            wrapper.id = 'page-wrapper-' + num;
            wrapper.style.minHeight = window.innerHeight + 'px'; 
            wrapper.dataset.page = num;
            wrapper.dataset.loaded = 'false';
            
            container.appendChild(wrapper);
            pageObserver.observe(wrapper);
        }

        setTimeout(() => {
            const targetPage = document.getElementById('page-wrapper-' + startPage);
            if (targetPage) targetPage.scrollIntoView();
        }, 100);
    }

    async function renderSinglePage(num, wrapper) {
        const page = await currentPdf.getPage(num);
        const canvas = document.createElement('canvas');
        const textLayerDiv = document.createElement('div');
        textLayerDiv.className = 'textLayer';
        
        wrapper.appendChild(canvas);
        wrapper.appendChild(textLayerDiv);
        
        const unscaledViewport = page.getViewport({ scale: 1 });
        const baseScale = window.innerWidth / unscaledViewport.width;
        const viewport = page.getViewport({ scale: baseScale * globalZoom });

        const outputScale = window.devicePixelRatio || 1;
        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = Math.floor(viewport.width) + "px";
        canvas.style.height = Math.floor(viewport.height) + "px";

        wrapper.style.width = Math.floor(viewport.width) + "px";
        wrapper.style.minHeight = 'auto';
        wrapper.style.height = Math.floor(viewport.height) + "px";

        const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;
        const context = canvas.getContext('2d');
        
        await page.render({ canvasContext: context, transform: transform, viewport: viewport }).promise;

        textLayerDiv.style.width = viewport.width + 'px';
        textLayerDiv.style.height = viewport.height + 'px';
        textLayerDiv.style.setProperty('--scale-factor', viewport.scale);
        
        const textContent = await page.getTextContent();
        pdfjsLib.renderTextLayer({ textContent: textContent, container: textLayerDiv, viewport: viewport, textDivs: [] });
    }

    document.addEventListener('selectionchange', () => {
        const sel = window.getSelection();
        const tooltip = document.getElementById('translate-tooltip');
        
        if (!sel.isCollapsed && sel.toString().trim().length > 1 && document.getElementById('tab-reader').classList.contains('active')) {
            pendingTranslationText = sel.toString().trim();
            const range = sel.getRangeAt(0);
            const rect = range.getBoundingClientRect();
            
            tooltip.style.display = 'block';
            tooltip.style.left = (rect.left + rect.width / 2) + 'px';
            
            let topPos = rect.top - 50;
            if (topPos < 50) topPos = rect.bottom + 10;
            tooltip.style.top = topPos + 'px';
            
        } else {
            tooltip.style.display = 'none';
            pendingTranslationText = "";
        }
    });

    window.addEventListener('scroll', () => {
        document.getElementById('translate-tooltip').style.display = 'none';
    }, true);

    async function executeTranslation() {
        if (!pendingTranslationText) return;
        
        document.getElementById('translate-tooltip').style.display = 'none';
        
        const selText = pendingTranslationText;
        document.getElementById('pop-en').innerText = selText;
        document.getElementById('pop-cs').innerText = "Překládám...";
        document.getElementById('popover').style.display = 'block';
        
        const trans = await translate(selText);
        lastSelection = { en: selText, cs: trans };
        document.getElementById('pop-cs').innerText = trans;
    }

    function saveWord() {
        if(!lastSelection.en) return;
        words.push({ ...lastSelection, id: Date.now() });
        localStorage.setItem('lingo_words', JSON.stringify(words));
        closePop();
    }
    
    function closePop() { 
        document.getElementById('popover').style.display = 'none'; 
        window.getSelection().removeAllRanges(); 
    }

    function exportBackup() {
        const tx = db.transaction('books', 'readonly');
        const req = tx.objectStore('books').getAll();
        
        req.onsuccess = () => {
            const books = req.result;
            const bookProgress = books.map(b => ({ id: b.id, name: b.name, currentPage: b.currentPage }));
            
            const backupData = {
                words: words,
                bookProgress: bookProgress
            };

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData));
            const downloadNode = document.createElement('a');
            downloadNode.setAttribute("href", dataStr);
            downloadNode.setAttribute("download", "lingo_kompletni_zaloha.json");
            document.body.appendChild(downloadNode);
            downloadNode.click();
            downloadNode.remove();
        };
    }

    function importBackup(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (importedData.words) {
                    words = importedData.words;
                    localStorage.setItem('lingo_words', JSON.stringify(words));
                    renderWords();
                } else if (Array.isArray(importedData)) { 
                    words = importedData;
                    localStorage.setItem('lingo_words', JSON.stringify(words));
                    renderWords();
                }
                
                if (importedData.bookProgress) {
                    // Uložíme si progres pro budoucí nahrání PDF souborů
                    localStorage.setItem('lingo_book_progress', JSON.stringify(importedData.bookProgress));
                    
                    if (db) {
                        const tx = db.transaction('books', 'readwrite');
                        const store = tx.objectStore('books');
                        importedData.bookProgress.forEach(backupBook => {
                            const getReq = store.get(backupBook.id);
                            getReq.onsuccess = () => {
                                if(getReq.result) {
                                    let b = getReq.result;
                                    b.currentPage = backupBook.currentPage;
                                    store.put(b);
                                }
                            };
                        });
                        tx.oncomplete = () => renderLibrary();
                    }
                }
                alert("Záloha byla úspěšně obnovena!");
            } catch (err) {
                alert("Chyba při čtení souboru. Zkontroluj, že jde o správnou zálohu.");
            }
        };
        reader.readAsText(file);
        event.target.value = ''; 
    }

    function deleteWord(id) {
        if(confirm("Opravdu smazat toto slovíčko?")) {
            words = words.filter(w => w.id !== id);
            localStorage.setItem('lingo_words', JSON.stringify(words));
            renderWords();
        }
    }

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        el.classList.add('active');
        
        if(id === 'reader') {
            if(!currentPdf) {
                document.getElementById('pdf-view').style.display = 'none';
                document.getElementById('pagination').style.display = 'none';
                document.getElementById('zoom-controls').style.display = 'none';
                document.getElementById('no-book-msg').style.display = 'block';
            } else {
                renderLibrary();
                document.getElementById('zoom-controls').style.display = 'flex';
            }
        } else {
            document.getElementById('zoom-controls').style.display = 'none';
            document.getElementById('translate-tooltip').style.display = 'none';
            if (id === 'library') renderLibrary();
            else if (id === 'words') renderWords();
            else if (id === 'cards') startCards();
        }
    }

    function renderWords() {
        const list = document.getElementById('word-list');
        if(words.length === 0) {
            list.innerHTML = "<p style='color:gray; text-align:center;'>Slovníček je zatím prázdný.</p>";
            return;
        }
        list.innerHTML = words.map(w => `
            <div class="word-item" style="max-width: 500px; margin-left: auto; margin-right: auto;">
                <div class="word-item-text">
                    <b>${w.en}</b><span style="opacity:0.8; margin-top:5px;">${w.cs}</span>
                </div>
                <button onclick="deleteWord(${w.id})" style="background:none; border:none; font-size:20px; color:#ff3b30; padding:10px; cursor:pointer;">🗑️</button>
            </div>`).reverse().join('');
    }

    let cardIdx = 0, cardFlipped = false;
    
    function startCards() { 
        cardIdx = 0; 
        cardFlipped = false; 
        updateCard(); 
    }
    
    function updateCard() {
        const c = document.getElementById('flashcard');
        const counter = document.getElementById('card-counter');
        
        if (!words.length) { 
            c.innerText = "Žádná slovíčka"; 
            counter.innerText = "0 / 0";
            return; 
        }
        
        c.innerText = cardFlipped ? words[cardIdx].cs : words[cardIdx].en;
        c.style.color = cardFlipped ? "var(--p)" : "var(--text)";
        c.style.fontSize = words[cardIdx].en.length > 30 ? "18px" : "24px";
        counter.innerText = `${cardIdx + 1} / ${words.length}`;
    }
    
    function flipCard() {
        if (!words.length) return;
        cardFlipped = !cardFlipped;
        updateCard();
    }

    function nextCard() {
        if (!words.length) return;
        cardIdx = (cardIdx + 1) % words.length;
        cardFlipped = false;
        updateCard();
    }

    function prevCard() {
        if (!words.length) return;
        cardIdx = (cardIdx - 1 + words.length) % words.length;
        cardFlipped = false;
        updateCard();
    }

    let touchstartX = 0;
    let touchendX = 0;
    const flashcardElement = document.getElementById('flashcard');

    flashcardElement.addEventListener('touchstart', e => {
        touchstartX = e.changedTouches[0].screenX;
    }, {passive: true});

    flashcardElement.addEventListener('touchend', e => {
        touchendX = e.changedTouches[0].screenX;
        handleSwipe();
    }, {passive: true});

    function handleSwipe() {
        if (touchendX < touchstartX - 40) nextCard(); 
        if (touchendX > touchstartX + 40) prevCard(); 
    }

    async function manualTranslate() {
        const input = document.getElementById('manual-input');
        if(!input.value.trim()) return;
        const res = await translate(input.value);
        lastSelection = { en: input.value, cs: res };
        document.getElementById('manual-result').innerHTML = `<div class="card" style="margin-top:10px; min-height:100px; font-size:16px; text-align:left;"><b>${input.value}</b><br><br>${res}<br><button class="btn-action" onclick="saveWord()">Uložit</button></div>`;
    }
</script>
</body>
</html>
