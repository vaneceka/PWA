<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LingoReader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --p: #007aff; --bg: #ffffff; --text: #000000; --card: #f2f2f7; }
        [data-theme="dark"] { --bg: #000000; --text: #ffffff; --card: #1c1c1e; --p: #0a84ff; }

        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: 0.3s; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 45px 20px 15px; background: rgba(var(--bg), 0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; }
        .nav-icons { display: flex; gap: 20px; font-size: 20px; cursor: pointer; }

        /* Kontejner pro scrollování PDF */
        #pdf-view { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 100px; }
        
        /* Obal každé stránky zvlášť */
        .pdf-page-wrapper { position: relative; width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; background: white; }
        .pdf-page-wrapper canvas { display: block; z-index: 1; width: 100%; }
        
        .textLayer { position: absolute; left: 0; top: 0; right: 0; bottom: 0; overflow: hidden; line-height: 1; text-size-adjust: none; z-index: 2; }
        .textLayer span { color: transparent; position: absolute; white-space: pre; cursor: text; transform-origin: 0% 0%; }
        .textLayer ::selection { background: rgba(0, 122, 255, 0.3); }

        /* Zmenšený indikátor stránky, tlačítka smazána */
        .pagination-bar { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(var(--bg), 0.9); backdrop-filter: blur(10px); padding: 8px 16px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 50; display: none; }
        #page-info { font-weight: bold; font-size: 14px; color: var(--text); }

        /* OPRAVA MENU: safe-area-inset-bottom pro iPhone notch/home bar */
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); background: var(--card); border-top: 1px solid #ccc; z-index: 101; }
        .tab-item { text-align: center; font-size: 10px; color: #8e8e93; text-decoration: none; flex: 1; }
        .tab-item.active { color: var(--p); }

        .tab-content { display: none; padding: 20px; padding-bottom: 120px; }
        .tab-content.active { display: block; }

        .card { background: var(--card); border-radius: 15px; padding: 40px 20px; text-align: center; margin-top: 30px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; font-size: 24px; font-weight: 600; }

        #popover { position: fixed; bottom: 120px; left: 15px; right: 15px; background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: none; z-index: 1000; max-height: 60vh; overflow-y: auto; }
        #pop-en { font-weight: bold; font-size: 18px; line-height: 1.4; word-wrap: break-word; }
        #pop-cs { margin: 15px 0; font-size: 16px; opacity: 0.9; line-height: 1.4; word-wrap: break-word; }
        .btn-action { background: var(--p); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 10px; font-size: 16px; cursor: pointer; display: block; text-align: center; }
        
        .word-item { padding: 15px; border-bottom: 1px solid rgba(128,128,128,0.3); display: flex; flex-direction: column; }
        .book-item { padding: 15px; background: var(--card); border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 18px;" id="book-title">Knihovna</div>
    <div class="nav-icons">
        <span onclick="toggleTheme()">🌓</span>
    </div>
</header>

<div id="tab-library" class="tab-content active">
    <h2 style="margin-top: 0;">Moje Knihy</h2>
    <label for="file-upload" class="btn-action" style="margin-bottom: 20px; background: #34c759;">+ Přidat knihu (PDF)</label>
    <input type="file" id="file-upload" accept="application/pdf" style="display:none">
    <div id="book-list">Načítám knihovnu...</div>
</div>

<div id="tab-reader" class="tab-content" style="padding: 0;">
    <div id="pdf-view"></div>
    
    <div class="pagination-bar" id="pagination">
        <span id="page-info">1 / 1</span>
    </div>
    
    <div id="no-book-msg" style="text-align:center; padding: 50px 20px; display:none;">
        <p>Zatím nemáte otevřenou žádnou knihu.</p>
        <button class="btn-action" onclick="document.getElementById('nav-lib').click()">Přejít do knihovny</button>
    </div>
</div>

<div id="tab-words" class="tab-content">
    <h2 style="margin-top: 0;">Slovníček</h2>
    <div id="word-list"></div>
</div>

<div id="tab-translate" class="tab-content">
    <h2>Překladač</h2>
    <textarea id="manual-input" style="width:100%; height:120px; border-radius:15px; padding:15px; background:var(--card); color:var(--text); border:none; font-size:16px; box-sizing: border-box;" placeholder="Vlož slovo nebo větu..."></textarea>
    <button class="btn-action" onclick="manualTranslate()">Přeložit</button>
    <div id="manual-result" style="margin-top:20px"></div>
</div>

<div id="tab-cards" class="tab-content">
    <h2>Trénink</h2>
    <div id="flashcard" class="card" onclick="flipCard()">Nahrajte slova</div>
</div>

<div id="popover">
    <div id="pop-en"></div>
    <div id="pop-cs"></div>
    <button class="btn-action" onclick="saveWord()">Uložit do slovníčku</button>
    <button onclick="closePop()" style="background:none; border:none; color:gray; width:100%; margin-top:15px; padding: 10px; font-weight:bold;">Zrušit označení</button>
</div>

<div class="tab-bar">
    <a href="#" id="nav-lib" class="tab-item active" onclick="showTab('library', this)">📚<br>Knihovna</a>
    <a href="#" id="nav-read" class="tab-item" onclick="showTab('reader', this)">📖<br>Čtení</a>
    <a href="#" class="tab-item" onclick="showTab('translate', this)">🔍<br>Překlad</a>
    <a href="#" class="tab-item" onclick="showTab('words', this)">📝<br>Slova</a>
    <a href="#" class="tab-item" onclick="showTab('cards', this)">🗂️<br>Karty</a>
</div>

<script>
    // --- ZÁKLADNÍ PROMĚNNÉ ---
    let words = JSON.parse(localStorage.getItem('lingo_words') || '[]');
    let currentPdf = null;
    let currentBookId = null;
    let lastSelection = { en: '', cs: '' };
    let db;
    let pageObserver; // Pro scrollování

    // --- INICIALIZACE DATABÁZE (IndexedDB pro PDF) ---
    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('LingoDB', 1);
            request.onerror = (e) => reject("Chyba databáze");
            request.onsuccess = (e) => { db = e.target.result; resolve(db); };
            request.onupgradeneeded = (e) => {
                const database = e.target.result;
                if (!database.objectStoreNames.contains('books')) {
                    database.createObjectStore('books', { keyPath: 'id' });
                }
            };
        });
    }

    initDB().then(() => renderLibrary());

    // --- TÉMA ---
    function toggleTheme() {
        const doc = document.documentElement;
        doc.setAttribute('data-theme', doc.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    // --- PŘEKLAD ---
    async function translate(text) {
        if (!text) return "";
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|cs`);
            const data = await res.json();
            return data.responseData.translatedText;
        } catch (e) { return "Chyba překladu"; }
    }

    // --- KNIHOVNA LOGIKA ---
    const fileInput = document.getElementById('file-upload');
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        document.getElementById('book-list').innerHTML = "Ukládám knihu do iPhonu...";
        
        const arrayBuffer = await file.arrayBuffer();
        const book = {
            id: Date.now().toString(),
            name: file.name.replace('.pdf', ''),
            data: arrayBuffer,
            currentPage: 1
        };

        const tx = db.transaction('books', 'readwrite');
        tx.objectStore('books').put(book);
        tx.oncomplete = () => renderLibrary();
    });

    function renderLibrary() {
        if(!db) return;
        const tx = db.transaction('books', 'readonly');
        const req = tx.objectStore('books').getAll();
        req.onsuccess = () => {
            const books = req.result;
            const list = document.getElementById('book-list');
            if(books.length === 0) {
                list.innerHTML = "<p style='color:gray; text-align:center;'>Zatím tu nemáte žádné knihy.</p>";
                return;
            }
            list.innerHTML = books.map(b => `
                <div class="book-item">
                    <div onclick="openBook('${b.id}')" style="flex:1; cursor:pointer;">
                        <b>${b.name.substring(0,25)}...</b><br>
                        <small style="color:gray;">Rozečteno: Strana ${b.currentPage}</small>
                    </div>
                    <button onclick="deleteBook('${b.id}')" style="background:none; border:none; font-size:22px; color:#ff3b30; padding:10px;">🗑️</button>
                </div>
            `).reverse().join('');
        };
    }

    function deleteBook(id) {
        if(confirm("Opravdu smazat tuto knihu?")) {
            const tx = db.transaction('books', 'readwrite');
            tx.objectStore('books').delete(id);
            tx.oncomplete = () => {
                if(currentBookId === id) {
                    currentBookId = null;
                    currentPdf = null;
                    document.getElementById('pdf-view').style.display = 'none';
                    document.getElementById('pagination').style.display = 'none';
                    document.getElementById('book-title').innerText = "Knihovna";
                }
                renderLibrary();
            };
        }
    }

    function openBook(id) {
        const tx = db.transaction('books', 'readonly');
        const req = tx.objectStore('books').get(id);
        req.onsuccess = async () => {
            const book = req.result;
            if(!book) return;
            
            currentBookId = book.id;
            document.getElementById('book-title').innerText = book.name.substring(0, 15) + "...";
            
            currentPdf = await pdfjsLib.getDocument({ data: new Uint8Array(book.data) }).promise;
            
            document.getElementById('pdf-view').style.display = 'flex';
            document.getElementById('pagination').style.display = 'block';
            document.getElementById('no-book-msg').style.display = 'none';
            
            document.getElementById('nav-read').click();
            
            // Spuštění scrollovacího enginu na uložené stránce
            initScrollReader(book.currentPage || 1);
        };
    }

    function updateBookProgress(page) {
        if(!currentBookId || !db) return;
        const tx = db.transaction('books', 'readwrite');
        const store = tx.objectStore('books');
        const req = store.get(currentBookId);
        req.onsuccess = () => {
            const book = req.result;
            if(book) {
                book.currentPage = page;
                store.put(book);
            }
        };
    }

    // --- NOVÝ SYSTÉM: SCROLLOVÁNÍ & RETINA BLUR FIX ---
    function initScrollReader(startPage) {
        const container = document.getElementById('pdf-view');
        container.innerHTML = '';
        
        if (pageObserver) pageObserver.disconnect();
        
        // Sledujeme, která stránka je právě na obrazovce
        pageObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const wrapper = entry.target;
                    const num = parseInt(wrapper.dataset.page);
                    
                    // Pokud ještě nebyla vykreslena, vykreslíme ji (Lazy Load)
                    if (wrapper.dataset.loaded === 'false') {
                        wrapper.dataset.loaded = 'true';
                        renderSinglePage(num, wrapper);
                    }
                    
                    document.getElementById('page-info').innerText = `${num} / ${currentPdf.numPages}`;
                    updateBookProgress(num);
                }
            });
        }, { rootMargin: '300px 0px' }); // Přednačítáme trochu dopředu
        
        // Vytvoříme obaly pro všechny stránky (zatím prázdné kvůli paměti iPhonu)
        for (let num = 1; num <= currentPdf.numPages; num++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'pdf-page-wrapper';
            wrapper.id = 'page-wrapper-' + num;
            wrapper.style.minHeight = window.innerHeight + 'px'; // Zástupná výška pro plynulý posuvník
            wrapper.dataset.page = num;
            wrapper.dataset.loaded = 'false';
            
            container.appendChild(wrapper);
            pageObserver.observe(wrapper);
        }

        // Automatické odscrollování na rozečtenou stránku
        setTimeout(() => {
            const targetPage = document.getElementById('page-wrapper-' + startPage);
            if (targetPage) targetPage.scrollIntoView();
        }, 100);
    }

    async function renderSinglePage(num, wrapper) {
        const page = await currentPdf.getPage(num);
        
        const canvas = document.createElement('canvas');
        const textLayerDiv = document.createElement('div');
        textLayerDiv.className = 'textLayer';
        
        wrapper.appendChild(canvas);
        wrapper.appendChild(textLayerDiv);
        
        // Zjištění měřítka k šířce displeje telefonu
        const unscaledViewport = page.getViewport({ scale: 1 });
        const scale = window.innerWidth / unscaledViewport.width;
        const viewport = page.getViewport({ scale: scale });

        // OPRAVA BLURU: Využití DevicePixelRatio pro super-ostré fonty na iPhonu
        const outputScale = window.devicePixelRatio || 1;
        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = Math.floor(viewport.width) + "px";
        canvas.style.height = Math.floor(viewport.height) + "px";

        const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;
        const context = canvas.getContext('2d');
        
        // Nastavení reálné výšky po zjištění parametrů stránky
        wrapper.style.minHeight = 'auto';
        wrapper.style.height = canvas.style.height;

        await page.render({ canvasContext: context, transform: transform, viewport: viewport }).promise;

        // Neviditelná vrstva pro přesný výběr textu
        textLayerDiv.style.width = viewport.width + 'px';
        textLayerDiv.style.height = viewport.height + 'px';
        textLayerDiv.style.setProperty('--scale-factor', viewport.scale);
        
        const textContent = await page.getTextContent();
        pdfjsLib.renderTextLayer({
            textContent: textContent,
            container: textLayerDiv,
            viewport: viewport,
            textDivs: []
        });
    }

    // --- OZNAČOVÁNÍ A PŘEKLAD ---
    document.addEventListener('touchend', handleSelection);
    document.addEventListener('mouseup', handleSelection);

    async function handleSelection() {
        setTimeout(async () => {
            const sel = window.getSelection().toString().trim();
            if (sel && sel.length > 1 && document.getElementById('tab-reader').classList.contains('active')) {
                const trans = await translate(sel);
                lastSelection = { en: sel, cs: trans };
                document.getElementById('pop-en').innerText = sel;
                document.getElementById('pop-cs').innerText = trans;
                document.getElementById('popover').style.display = 'block';
            }
        }, 100);
    }

    function saveWord() {
        words.push({ ...lastSelection, id: Date.now() });
        localStorage.setItem('lingo_words', JSON.stringify(words));
        closePop();
    }
    
    function closePop() { 
        document.getElementById('popover').style.display = 'none'; 
        window.getSelection().removeAllRanges(); 
    }

    // --- NAVIGACE TABS ---
    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        el.classList.add('active');
        
        if(id === 'reader') {
            if(!currentPdf) {
                document.getElementById('pdf-view').style.display = 'none';
                document.getElementById('pagination').style.display = 'none';
                document.getElementById('no-book-msg').style.display = 'block';
            } else {
                renderLibrary();
            }
        } else if (id === 'library') {
            renderLibrary();
        } else if (id === 'words') {
            renderWords();
        } else if (id === 'cards') {
            startCards();
        }
    }

    // --- SLOVA & KARTY ---
    function renderWords() {
        const list = document.getElementById('word-list');
        list.innerHTML = words.map(w => `
            <div class="word-item">
                <b>${w.en}</b><span style="opacity:0.8; margin-top:5px;">${w.cs}</span>
            </div>`).reverse().join('');
    }

    let cardIdx = 0, cardFlipped = false;
    function startCards() { cardIdx = 0; cardFlipped = false; updateCard(); }
    
    function updateCard() {
        const c = document.getElementById('flashcard');
        if (!words.length) { c.innerText = "Žádná slovíčka nebo věty"; return; }
        c.innerText = cardFlipped ? words[cardIdx].cs : words[cardIdx].en;
        c.style.color = cardFlipped ? "var(--p)" : "var(--text)";
        c.style.fontSize = words[cardIdx].en.length > 30 ? "18px" : "24px";
    }
    
    function flipCard() {
        if (!words.length) return;
        if (!cardFlipped) { cardFlipped = true; } 
        else { cardFlipped = false; cardIdx = (cardIdx + 1) % words.length; }
        updateCard();
    }

    async function manualTranslate() {
        const input = document.getElementById('manual-input');
        const res = await translate(input.value);
        lastSelection = { en: input.value, cs: res };
        document.getElementById('manual-result').innerHTML = `<div class="card" style="margin-top:10px; min-height:100px; font-size:16px; text-align:left;"><b>${input.value}</b><br><br>${res}<br><button class="btn-action" onclick="saveWord()">Uložit</button></div>`;
    }
</script>
</body>
</html>
