<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LingoReader Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root { --p: #007aff; --bg: #ffffff; --text: #000000; --card: #f2f2f7; }
        [data-theme="dark"] { --bg: #000000; --text: #ffffff; --card: #1c1c1e; --p: #0a84ff; }

        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 45px 20px 15px; background: rgba(var(--bg), 0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; }
        .nav-icons { display: flex; gap: 20px; font-size: 20px; cursor: pointer; }

        /* --- PDF VRSTVY (VYLEPŠENÉ ZAROVNÁNÍ) --- */
        #pdf-view { position: relative; width: 100%; display: flex; justify-content: center; margin-bottom: 60px; }
        #pdf-render { max-width: 100%; height: auto; z-index: 1; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        .textLayer {
            position: absolute;
            left: 0; top: 0; right: 0; bottom: 0;
            overflow: hidden;
            line-height: 1;
            text-size-adjust: none;
            z-index: 2;
        }
        .textLayer span {
            color: transparent;
            position: absolute;
            white-space: pre;
            cursor: text;
            transform-origin: 0% 0%;
        }
        /* Zvýraznění při označení pro lepší orientaci */
        .textLayer ::selection { background: rgba(0, 122, 255, 0.3); }

        /* --- PLOVOUCÍ STRÁNKOVÁNÍ --- */
        .pagination-bar {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(var(--bg), 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 50;
        }
        .pagination-bar button { background: none; border: none; font-size: 20px; color: var(--p); font-weight: bold; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; padding: 15px 0 35px; background: var(--card); border-top: 1px solid #ccc; z-index: 101; }
        .tab-item { text-align: center; font-size: 10px; color: #8e8e93; text-decoration: none; }
        .tab-item.active { color: var(--p); }

        .tab-content { display: none; padding: 20px; padding-bottom: 120px; }
        .tab-content.active { display: block; }

        .card { background: var(--card); border-radius: 15px; padding: 40px 20px; text-align: center; margin-top: 30px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; font-size: 24px; font-weight: 600; }

        /* Přizpůsobení pro delší věty */
        #popover { position: fixed; bottom: 110px; left: 15px; right: 15px; background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: none; z-index: 1000; max-height: 60vh; overflow-y: auto; }
        #pop-en { font-weight: bold; font-size: 18px; line-height: 1.4; word-wrap: break-word; }
        #pop-cs { margin: 15px 0; font-size: 16px; opacity: 0.9; line-height: 1.4; word-wrap: break-word; }
        .btn-action { background: var(--p); color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 10px; font-size: 16px; }
        
        .word-item { padding: 15px; border-bottom: 1px solid rgba(128,128,128,0.3); display: flex; flex-direction: column; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 18px;" id="book-title">LingoReader</div>
    <div class="nav-icons">
        <span onclick="toggleTheme()">🌓</span>
        <label for="file-upload" style="cursor:pointer">📂</label>
        <input type="file" id="file-upload" accept="application/pdf" style="display:none">
    </div>
</header>

<div id="tab-reader" class="tab-content active" style="padding: 0;">
    <div id="pdf-view">
        <canvas id="pdf-render"></canvas>
        <div id="text-layer" class="textLayer"></div>
    </div>
    
    <div class="pagination-bar" id="pagination" style="display: none;">
        <button onclick="prevPage()">⬅️</button>
        <span id="page-info" style="font-weight: bold; font-size: 14px;">1 / 1</span>
        <button onclick="nextPage()">➡️</button>
    </div>
</div>

<div id="tab-words" class="tab-content">
    <h2 style="margin-top: 0;">Slovníček</h2>
    <div id="word-list"></div>
</div>

<div id="tab-translate" class="tab-content">
    <h2>Překladač</h2>
    <textarea id="manual-input" style="width:100%; height:120px; border-radius:15px; padding:15px; background:var(--card); color:var(--text); border:none; font-size:16px;" placeholder="Vlož slovo nebo větu..."></textarea>
    <button class="btn-action" onclick="manualTranslate()">Přeložit</button>
    <div id="manual-result" style="margin-top:20px"></div>
</div>

<div id="tab-cards" class="tab-content">
    <h2>Trénink</h2>
    <div id="flashcard" class="card" onclick="flipCard()">Nahrajte slova</div>
</div>

<div id="popover">
    <div id="pop-en"></div>
    <div id="pop-cs"></div>
    <button class="btn-action" onclick="saveWord()">Uložit do slovníčku</button>
    <button onclick="closePop()" style="background:none; border:none; color:gray; width:100%; margin-top:15px; padding: 10px;">Zrušit označení</button>
</div>

<div class="tab-bar">
    <a href="#" class="tab-item active" onclick="showTab('reader', this)">📖<br>Kniha</a>
    <a href="#" class="tab-item" onclick="showTab('translate', this)">🔍<br>Překlad</a>
    <a href="#" class="tab-item" onclick="showTab('words', this)">📚<br>Slova</a>
    <a href="#" class="tab-item" onclick="showTab('cards', this)">🗂️<br>Karty</a>
</div>

<script>
    let words = JSON.parse(localStorage.getItem('lingo_words') || '[]');
    let currentPdf = null;
    let pageNum = parseInt(localStorage.getItem('pdf_last_page')) || 1;
    let lastSelection = { en: '', cs: '' };

    function toggleTheme() {
        const doc = document.documentElement;
        const isDark = doc.getAttribute('data-theme') === 'dark';
        doc.setAttribute('data-theme', isDark ? 'light' : 'dark');
    }

    async function translate(text) {
        if (!text) return "";
        try {
            // MyMemory API umí překládat celé věty
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|cs`);
            const data = await res.json();
            return data.responseData.translatedText;
        } catch (e) { return "Chyba překladu"; }
    }

    const fileInput = document.getElementById('file-upload');
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('book-title').innerText = file.name.substring(0, 15) + "...";
        const reader = new FileReader();
        reader.onload = function() { loadPdf(new Uint8Array(this.result)); };
        reader.readAsArrayBuffer(file);
    });

    async function loadPdf(data) {
        currentPdf = await pdfjsLib.getDocument(data).promise;
        document.getElementById('pagination').style.display = 'flex';
        renderPage(pageNum);
    }

    async function renderPage(num) {
        if (!currentPdf) return;
        const page = await currentPdf.getPage(num);
        const canvas = document.getElementById('pdf-render');
        const textLayerDiv = document.getElementById('text-layer');
        const context = canvas.getContext('2d');
        
        const viewport = page.getViewport({ scale: window.innerWidth / page.getViewport({scale:1}).width * 1.5 });
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        // Vykreslení PDF obrázku
        await page.render({ canvasContext: context, viewport: viewport }).promise;

        // Vytvoření textové vrstvy
        textLayerDiv.innerHTML = "";
        textLayerDiv.style.width = canvas.width + 'px';
        textLayerDiv.style.height = canvas.height + 'px';
        
        const textContent = await page.getTextContent();
        pdfjsLib.renderTextLayer({
            textContent: textContent,
            container: textLayerDiv,
            viewport: viewport,
            textDivs: []
        });

        document.getElementById('page-info').innerText = `${num} / ${currentPdf.numPages}`;
        localStorage.setItem('pdf_last_page', num);
    }

    function nextPage() { if (pageNum < currentPdf.numPages) { pageNum++; renderPage(pageNum); } }
    function prevPage() { if (pageNum > 1) { pageNum--; renderPage(pageNum); } }

    // Gesto označení - podpora pro věty
    document.addEventListener('touchend', handleSelection);
    document.addEventListener('mouseup', handleSelection);

    async function handleSelection() {
        // Zpoždění, aby iOS stihl zaregistrovat konec výběru
        setTimeout(async () => {
            const sel = window.getSelection().toString().trim();
            if (sel && sel.length > 1 && document.getElementById('tab-reader').classList.contains('active')) {
                const trans = await translate(sel);
                lastSelection = { en: sel, cs: trans };
                document.getElementById('pop-en').innerText = sel;
                document.getElementById('pop-cs').innerText = trans;
                document.getElementById('popover').style.display = 'block';
            }
        }, 100);
    }

    function saveWord() {
        words.push({ ...lastSelection, id: Date.now() });
        localStorage.setItem('lingo_words', JSON.stringify(words));
        closePop();
    }
    
    function closePop() { 
        document.getElementById('popover').style.display = 'none'; 
        window.getSelection().removeAllRanges(); 
    }

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        el.classList.add('active');
        if(id === 'words') renderWords();
        if(id === 'cards') startCards();
    }

    function renderWords() {
        const list = document.getElementById('word-list');
        list.innerHTML = words.map(w => `
            <div class="word-item">
                <b>${w.en}</b><span style="opacity:0.8; margin-top:5px;">${w.cs}</span>
            </div>`).reverse().join('');
    }

    let cardIdx = 0, cardFlipped = false;
    function startCards() { cardIdx = 0; cardFlipped = false; updateCard(); }
    
    function updateCard() {
        const c = document.getElementById('flashcard');
        if (!words.length) { c.innerText = "Žádná slovíčka nebo věty"; return; }
        c.innerText = cardFlipped ? words[cardIdx].cs : words[cardIdx].en;
        c.style.color = cardFlipped ? "var(--p)" : "var(--text)";
        c.style.fontSize = words[cardIdx].en.length > 30 ? "18px" : "24px"; // Zmenší písmo pro věty
    }
    
    function flipCard() {
        if (!words.length) return;
        if (!cardFlipped) { cardFlipped = true; } 
        else { cardFlipped = false; cardIdx = (cardIdx + 1) % words.length; }
        updateCard();
    }

    async function manualTranslate() {
        const input = document.getElementById('manual-input');
        const res = await translate(input.value);
        lastSelection = { en: input.value, cs: res };
        document.getElementById('manual-result').innerHTML = `<div class="card" style="margin-top:10px; min-height:100px; font-size:16px; text-align:left;"><b>${input.value}</b><br><br>${res}<br><button class="btn-action" onclick="saveWord()">Uložit</button></div>`;
    }
</script>
</body>
</html>
